name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { submodules: recursive }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Install server (+ dev + engine extras)
        working-directory: server
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,engine]"
      - name: ruff
        working-directory: server
        run: |
          pip install ruff
          ruff check . || true
      - name: pytest (CPU; numpy MoE path)
        working-directory: server
        run: pytest tests -q
      - name: Engine configs parse
        run: |
          python -c "import yaml,glob; [yaml.safe_load(open(f)) for f in glob.glob('configs/**/*.yaml', recursive=True)]"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "22" }
      - name: Install
        working-directory: web
        run: npm ci
      - name: Typecheck + build
        working-directory: web
        run: npm run build

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: No committed model weights or datasets
        run: |
          ! git ls-files | grep -E '\.(safetensors|bin|pt|pth|ckpt|gguf)$' \
            || (echo "::error::Model artifact committed"; exit 1)
      - name: CRLF check on shell scripts
        run: |
          if git ls-files '*.sh' | xargs file 2>/dev/null | grep -q CRLF; then
            echo "::error::CRLF line endings in a .sh file"; exit 1
          fi
